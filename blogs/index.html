<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Centameta Blog" />
  <link rel="canonical" href="https://centameta.com/blogs/" />
  <title>Blogs | Centameta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=Syncopate:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050506;
      --ink: #f4f4f5;
      --silver: #c7ccd4;
      --gold: #bda06a;
      --champagne: #e5d1a6;
      --accent-red: #bf4342;
      --muted: #8f96a2;
      --line: rgba(255, 255, 255, 0.12);
      --glass: rgba(255, 255, 255, 0.06);
      --glass-strong: rgba(255, 255, 255, 0.1);
      --max: 1160px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background:
        radial-gradient(circle at 84% 12%, rgba(188, 160, 106, 0.2), transparent 34%),
        radial-gradient(circle at 18% 14%, rgba(141, 170, 203, 0.22), transparent 32%),
        linear-gradient(180deg, #060709 0%, #030304 100%);
      color: var(--ink);
      font-family: "Sora", sans-serif;
      min-height: 100vh;
      line-height: 1.5;
    }

    .wrap {
      position: relative;
      max-width: var(--max);
      margin: 0 auto;
      padding: 0 32px;
    }

    header.topbar {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 28px 0;
      border-bottom: 1px solid var(--line);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: inherit;
    }

    .brand-text {
      font-family: "Syncopate", sans-serif;
      letter-spacing: 0.12em;
      font-size: 0.92rem;
      color: #f8f8f8;
      text-transform: uppercase;
    }

    .brand-accent { color: var(--accent-red); }

    .nav {
      display: flex;
      gap: 22px;
      justify-content: flex-end;
      flex-wrap: wrap;
    }

    .nav a {
      position: relative;
      text-decoration: none;
      color: var(--silver);
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: color 220ms ease;
    }

    .nav a::before {
      content: "";
      position: absolute;
      left: -10px;
      top: 50%;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--accent-red);
      transform: translateY(-50%);
      opacity: 0.65;
    }

    .nav a:hover { color: var(--champagne); }

    main { position: relative; padding: 64px 0 88px; }

    .page-header h1 {
      font-family: "Syncopate", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: clamp(1.6rem, 3.4vw, 2.8rem);
      margin-bottom: 18px;
    }

    .page-lead {
      color: #c6cfda;
      max-width: 64ch;
      margin-bottom: 52px;
    }

    .posts {
      display: grid;
      gap: 24px;
    }

    .post {
      background: linear-gradient(170deg, var(--glass-strong), rgba(255, 255, 255, 0.03));
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 18px;
      padding: 22px 22px 20px;
      backdrop-filter: blur(6px);
      transition: transform 260ms ease, border-color 260ms ease, box-shadow 260ms ease;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .post:hover {
      transform: translateY(-4px);
      border-color: rgba(210, 186, 133, 0.72);
      box-shadow: 0 18px 34px rgba(0, 0, 0, 0.38);
    }

    .post-meta {
      color: var(--muted);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .post h2 {
      font-family: "Syncopate", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: clamp(1rem, 2vw, 1.4rem);
      margin-bottom: 10px;
    }

    .post-title-accent { color: var(--champagne); }

    .post p {
      color: #b9c4d3;
      max-width: 68ch;
      font-size: 0.96rem;
    }

    .post-cta {
      margin-top: 14px;
      color: var(--gold);
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      transition: color 220ms ease;
    }

    .post:hover .post-cta { color: var(--champagne); }

    .empty {
      color: var(--muted);
      max-width: 56ch;
      font-size: 0.96rem;
    }

    footer.footer {
      border-top: 1px solid var(--line);
      padding: 24px 0 40px;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.08em;
    }

    footer.footer a { color: inherit; text-decoration: none; }
    footer.footer a:hover { color: var(--champagne); }

    @media (max-width: 640px) {
      .wrap { padding: 0 20px; }
      .nav { gap: 14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <a class="brand" href="/">
        <span class="brand-text">Centameta</span>
      </a>
      <nav class="nav" aria-label="Main navigation">
        <a href="/">Home</a>
        <a href="/blogs/">Blog</a>
      </nav>
    </header>

    <main>
      <header class="page-header">
        <h1>Blogs</h1>
        <p class="page-lead">
          Notes from Centameta on intelligent systems, agent tooling, embedded development, and analytics.
        </p>
      </header>

      <div class="posts" id="posts"></div>
    </main>

    <footer class="footer">
      <a href="/">Centameta</a> · Engineering Depth for Intelligent Products
    </footer>
  </div>

  <script>
    (function () {
      var posts = [
        {
          href: '2026/06/01_features-and-use-cases-of-hermes-agent.html',
          title: 'Features and Use Cases of Hermes Agent',
          date: '2026-06-01',
          excerpt: 'A practical look at what Hermes Agent can do and where it fits in an engineering workflow.'
        }
        // new posts: keep newest first
      ];

      var container = document.getElementById('posts');

      if (!posts.length) {
        container.innerHTML = '<p class="empty">No posts yet.</p>';
        return;
      }

      posts.forEach(function (item) {
        var el = document.createElement('a');
        el.href = item.href;
        el.className = 'post';

        var title = document.createElement('h2');
        title.className = 'post-title-accent';
        title.textContent = item.title;

        var meta = document.createElement('div');
        meta.className = 'post-meta';
        meta.textContent = item.date;

        var p = document.createElement('p');
        p.textContent = item.excerpt;

        var cta = document.createElement('div');
        cta.className = 'post-cta';
        cta.textContent = 'Read post \u2192';

        el.appendChild(meta);
        el.appendChild(title);
        el.appendChild(p);
        el.appendChild(cta);
        container.appendChild(el);
      });
    })();
  </script>
</body>
</html>
